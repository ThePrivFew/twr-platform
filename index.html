<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wattle Road — Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
/* ─── TOKENS ─────────────────────────────────────────────────────────────── */
:root {
  --bark:     #1E1C19;
  --bark-mid: #2C2A26;
  --bark-s:   #3A3730;
  --timber:   #8B6A3E;
  --timber-l: #AD864E;
  --timber-p: #C9A872;
  --timber-g: rgba(139,106,62,0.1);
  --cream:    #F5F0E8;
  --cream-dk: #EDE4D3;
  --cream-md: #E2D8C4;
  --paper:    #FAF8F4;
  --sand:     #D4C4A8;
  --stone:    #7A7570;
  --moss:     #4A5E2E;
  --moss-l:   #6A8040;
  --clay:     #B87040;
  --red:      #8B2A2A;
  --red-l:    #C05050;
  --blue:     #2A4A7A;
  --blue-l:   #4A6AAA;
  --serif:    'Cormorant Garamond', Georgia, serif;
  --sans:     'DM Sans', -apple-system, sans-serif;
  --r:        8px;
  --border:   0.5px solid rgba(30,28,25,0.1);
  --shadow:   0 2px 12px rgba(30,28,25,0.08);
  --shadow-lg:0 8px 32px rgba(30,28,25,0.14);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--paper);
  color: var(--bark);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── ANIMATIONS ─────────────────────────────────────────────────────────── */
@keyframes fadeUp   { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }
@keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
@keyframes slideR   { from { transform:translateX(32px);opacity:0 } to { transform:none;opacity:1 } }
@keyframes spin     { to { transform:rotate(360deg) } }
@keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.5} }

.fu  { animation: fadeUp .3s ease both }
.fu1 { animation: fadeUp .3s .06s ease both }
.fu2 { animation: fadeUp .3s .12s ease both }
.fu3 { animation: fadeUp .3s .18s ease both }
.fu4 { animation: fadeUp .3s .24s ease both }

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
.shell { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ────────────────────────────────────────────────────────────── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bark);
  display: flex; flex-direction: column;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}

.sb-brand {
  padding: 20px 16px 14px;
  border-bottom: 0.5px solid rgba(255,255,255,0.07);
}

.sb-brand-name {
  font-family: var(--serif);
  font-size: 15px; font-weight: 400;
  color: var(--timber-p);
  letter-spacing: .04em; line-height: 1.2;
}

.sb-brand-sub {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .18em;
  color: rgba(255,255,255,0.28);
  margin-top: 3px;
}

.sb-role {
  margin: 8px 16px 0;
  font-size: 9px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .1em;
  padding: 3px 8px; border-radius: 3px;
  display: inline-block;
}

.sb-role-admin { background: rgba(139,106,62,.3); color: var(--timber-p); }
.sb-role-client { background: rgba(74,94,46,.3); color: #8AAA60; }

.sb-nav { padding: 10px 10px; flex: 1; }
.sb-lbl {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: .14em; color: rgba(255,255,255,.22);
  padding: 10px 8px 4px; font-weight: 500;
}

.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 5px;
  cursor: pointer; font-size: 12px;
  color: rgba(255,255,255,.42);
  margin-bottom: 1px; border: none;
  background: transparent; width: 100%;
  text-align: left; font-family: var(--sans);
  transition: all .12s; position: relative;
}

.sb-item:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.75); }
.sb-item.active { background: var(--timber); color: #fff; }
.sb-item svg { width: 14px; height: 14px; flex-shrink: 0; opacity: .75; }
.sb-item.active svg { opacity: 1; }

.sb-badge {
  margin-left: auto;
  background: var(--clay); color: #fff;
  font-size: 9px; padding: 1px 6px;
  border-radius: 10px; font-weight: 600;
}

.sb-foot {
  padding: 12px 14px;
  border-top: 0.5px solid rgba(255,255,255,.07);
  display: flex; align-items: center; gap: 8px;
}

.sb-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--timber);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; color: #fff;
  flex-shrink: 0; cursor: pointer;
}

.sb-foot-name { font-size: 11px; color: rgba(255,255,255,.45); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─── MAIN ───────────────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  background: #fff; border-bottom: var(--border);
  padding: 13px 28px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  position: sticky; top: 0; z-index: 50;
}

.page-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--bark); }
.page-sub   { font-size: 11px; color: var(--stone); margin-top: 1px; }

.topbar-right { display: flex; gap: 8px; align-items: center; }

.content { padding: 24px 28px 60px; }

/* ─── VIEWS ──────────────────────────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ─── BUTTONS ────────────────────────────────────────────────────────────── */
.btn {
  font-family: var(--sans); font-size: 12px;
  padding: 7px 14px; border-radius: var(--r);
  cursor: pointer; border: var(--border);
  background: transparent; color: var(--bark);
  transition: all .15s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn:hover { background: var(--cream); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary  { background: var(--bark);   color: var(--cream); border-color: var(--bark); }
.btn-primary:hover { background: var(--bark-mid); }
.btn-timber   { background: var(--timber); color: #fff; border-color: var(--timber); }
.btn-timber:hover { background: var(--timber-l); }
.btn-moss     { background: var(--moss);   color: #fff; border-color: var(--moss); }
.btn-sm  { padding: 5px 10px; font-size: 11px; }
.btn-danger { color: var(--red-l); border-color: #F09595; }
.btn-danger:hover { background: #FCEBEB; }
.btn-full { width: 100%; justify-content: center; }

/* ─── FORM ───────────────────────────────────────────────────────────────── */
.form-group  { margin-bottom: 14px; }
.form-row    { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

.form-label {
  display: block; font-size: 10px;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--stone); margin-bottom: 5px; font-weight: 500;
}

.form-input, .form-select, .form-textarea {
  width: 100%; font-size: 13px;
  padding: 9px 12px; border-radius: var(--r);
  border: var(--border); background: #fff;
  color: var(--bark); font-family: var(--sans);
  outline: none; transition: border-color .15s;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--timber);
  box-shadow: 0 0 0 3px var(--timber-g);
}
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-select   { cursor: pointer; }
.form-hint     { font-size: 11px; color: var(--stone); margin-top: 4px; }

/* ─── PANEL ──────────────────────────────────────────────────────────────── */
.panel {
  background: #fff; border: var(--border);
  border-radius: var(--r); overflow: hidden;
  margin-bottom: 16px;
}
.panel-head {
  padding: 13px 18px; border-bottom: var(--border);
  display: flex; align-items: center;
  justify-content: space-between; gap: 10px; flex-wrap: wrap;
}
.panel-title { font-family: var(--serif); font-size: 15px; font-weight: 500; color: var(--bark); }
.panel-body  { padding: 16px 18px; }
.panel-link  { font-size: 11px; color: var(--timber); cursor: pointer; white-space: nowrap; }

/* ─── STATS ──────────────────────────────────────────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px; margin-bottom: 20px;
}

.stat {
  background: #fff; border: var(--border);
  border-radius: var(--r); padding: 16px 18px;
  position: relative; overflow: hidden;
}

.stat::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
}
.s1::before { background: var(--timber); }
.s2::before { background: var(--moss); }
.s3::before { background: var(--clay); }
.s4::before { background: var(--blue-l); }
.s5::before { background: var(--stone); }

.stat-lbl  { font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--stone); margin-bottom: 4px; font-weight: 500; }
.stat-val  { font-family: var(--serif); font-size: 32px; font-weight: 500; color: var(--bark); line-height: 1; margin-bottom: 4px; }
.stat-sub  { font-size: 11px; color: var(--stone); }

/* ─── TABLE ──────────────────────────────────────────────────────────────── */
.tbl { width: 100%; border-collapse: collapse; }
.tbl th {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .09em; color: var(--stone);
  padding: 9px 16px; text-align: left;
  background: var(--cream); font-weight: 500;
  border-bottom: var(--border); white-space: nowrap;
}
.tbl td {
  padding: 11px 16px; font-size: 12px;
  border-bottom: var(--border); color: var(--bark);
  vertical-align: middle;
}
.tbl tr:hover td { background: var(--paper); cursor: pointer; }
.tbl tr:last-child td { border-bottom: none; }
.mat-name   { font-size: 12px; font-weight: 500; color: var(--bark); }
.mat-origin { font-size: 11px; color: var(--stone); margin-top: 1px; }

/* ─── TAGS / BADGES ──────────────────────────────────────────────────────── */
.tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 3px; font-size: 10px; font-weight: 500;
}
.tag-timber   { background: #F5E8DB; color: #7A3A1A; }
.tag-masonry  { background: #EDE9E3; color: #5A4F3A; }
.tag-metal    { background: #E5EAF2; color: #2A3A55; }
.tag-glass    { background: #E3EEF0; color: #1A4A55; }
.tag-fixtures { background: #F0EAF5; color: #4A2A5A; }
.tag-other    { background: var(--cream); color: var(--stone); }

.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.dot-av  { background: var(--moss); }
.dot-pr  { background: var(--clay); }
.dot-al  { background: var(--timber); }
.dot-so  { background: var(--stone); }
.dot-new { background: var(--blue-l); }

.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 20px; font-size: 9px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
}
.badge-green  { background: #EAF3DE; color: #27500A; }
.badge-amber  { background: #FAEEDA; color: #633806; }
.badge-red    { background: #FCEBEB; color: #8B2A2A; }
.badge-blue   { background: #E3EBF7; color: #2A4A7A; }
.badge-stone  { background: var(--cream-dk); color: var(--stone); }
.badge-moss   { background: #E8EDD9; color: var(--moss); }

.use-badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 3px; font-size: 10px;
  background: #E8EDD9; color: var(--moss);
  margin: 1px 2px 0 0;
}

/* ─── PROGRESS ───────────────────────────────────────────────────────────── */
.prog-bar { height: 5px; background: var(--cream-dk); border-radius: 3px; overflow: hidden; margin: 6px 0; }
.prog-fill { height: 100%; background: var(--timber); border-radius: 3px; transition: width .3s; }

/* ─── PROJECT CARD ───────────────────────────────────────────────────────── */
.proj-card {
  background: #fff; border: var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 10px; cursor: pointer;
  transition: box-shadow .15s;
}
.proj-card:hover { box-shadow: var(--shadow); }
.proj-card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.proj-card-name { font-family: var(--serif); font-size: 16px; font-weight: 500; color: var(--bark); }
.proj-card-addr { font-size: 11px; color: var(--stone); margin-top: 2px; }

/* ─── SECTION LABEL ──────────────────────────────────────────────────────── */
.section-lbl {
  font-size: 10px; text-transform: uppercase;
  letter-spacing: .1em; color: var(--stone);
  margin: 18px 0 8px; font-weight: 500;
}

/* ─── INFO ROW ───────────────────────────────────────────────────────────── */
.info-row {
  display: flex; gap: 10px;
  padding: 9px 0; border-bottom: 0.5px solid rgba(30,28,25,.06);
}
.info-row:last-child { border-bottom: none; }
.info-key { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--stone); min-width: 100px; font-weight: 500; padding-top: 1px; }
.info-val { font-size: 13px; color: var(--bark); flex: 1; line-height: 1.5; }

/* ─── SIGN-OFF BARS ──────────────────────────────────────────────────────── */
.sig-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; border-bottom: var(--border); gap: 12px;
}
.sig-bar:last-child { border-bottom: none; }
.sig-lbl { font-size: 12px; font-weight: 500; color: var(--bark); }
.sig-sub { font-size: 11px; color: var(--stone); margin-top: 1px; }
.sig-btn { font-size: 11px; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-family: var(--sans); white-space: nowrap; flex-shrink: 0; }

/* ─── GATE / AUTH ────────────────────────────────────────────────────────── */
.gate {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 32px 16px;
  background: var(--paper);
}

.gate-card {
  width: 100%; max-width: 380px;
  background: #fff; border: var(--border);
  border-radius: 12px; padding: 32px 28px;
  box-shadow: var(--shadow-lg);
}

.gate-logo { font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--timber); margin-bottom: 2px; }
.gate-sub  { font-size: 10px; text-transform: uppercase; letter-spacing: .18em; color: var(--stone); margin-bottom: 24px; }
.gate-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--bark); margin-bottom: 5px; }
.gate-desc  { font-size: 12px; color: var(--stone); line-height: 1.6; margin-bottom: 20px; }
.gate-divider { font-size: 10px; color: var(--stone); text-align: center; margin: 14px 0; text-transform: uppercase; letter-spacing: .1em; }
.gate-error { font-size: 11px; color: var(--red-l); margin-top: 8px; text-align: center; display: none; }
.gate-foot  { font-size: 11px; color: var(--stone); text-align: center; margin-top: 20px; line-height: 1.6; }

/* ─── STORY PAGE ─────────────────────────────────────────────────────────── */
.story-hero {
  background: linear-gradient(160deg, var(--bark) 0%, var(--bark-mid) 100%);
  border-radius: var(--r);
  padding: 40px 32px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
}
.story-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
}
.story-eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: .2em; color: var(--timber-p); opacity: .8; margin-bottom: 8px; }
.story-title   { font-family: var(--serif); font-size: 32px; font-weight: 300; color: #fff; line-height: 1.15; margin-bottom: 8px; }
.story-sub     { font-size: 13px; color: rgba(255,255,255,.55); line-height: 1.6; }

.story-section { margin-bottom: 24px; }
.story-section-title { font-family: var(--serif); font-size: 18px; font-weight: 500; color: var(--bark); margin-bottom: 12px; }
.story-body { font-size: 13px; color: var(--bark); line-height: 1.8; }

.cert-card {
  background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dk) 100%);
  border: 1px solid var(--sand);
  border-radius: var(--r);
  padding: 24px;
  position: relative;
}
.cert-card::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 0.5px solid var(--sand);
  border-radius: 4px;
  pointer-events: none;
}
.cert-title { font-family: var(--serif); font-size: 22px; font-weight: 400; color: var(--bark); margin-bottom: 4px; }
.cert-sub   { font-size: 10px; text-transform: uppercase; letter-spacing: .18em; color: var(--stone); margin-bottom: 16px; }

/* ─── PUBLISH MOMENT ─────────────────────────────────────────────────────── */
.publish-overlay {
  position: fixed; inset: 0;
  background: var(--bark);
  z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px;
  animation: fadeIn .4s ease;
}
.publish-title { font-family: var(--serif); font-size: 40px; font-weight: 300; color: var(--cream); text-align: center; line-height: 1.2; margin-bottom: 12px; }
.publish-sub   { font-size: 14px; color: var(--timber-p); text-align: center; margin-bottom: 40px; }

/* ─── JOURNAL CARD ───────────────────────────────────────────────────────── */
.journal-entry {
  background: #fff; border: var(--border);
  border-radius: var(--r); padding: 14px 16px;
  margin-bottom: 8px; position: relative;
}
.journal-date  { font-size: 11px; color: var(--stone); margin-bottom: 4px; }
.journal-body  { font-size: 13px; color: var(--bark); line-height: 1.6; }
.journal-author { font-size: 10px; color: var(--timber); margin-top: 6px; font-weight: 500; }

/* ─── REFERRAL ───────────────────────────────────────────────────────────── */
.referral-box {
  background: linear-gradient(135deg, var(--cream) 0%, #fff 100%);
  border: 1px solid var(--sand);
  border-radius: var(--r);
  padding: 20px;
}
.ref-link {
  background: var(--cream-dk);
  border: var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 12px;
  font-family: monospace;
  color: var(--bark);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin: 10px 0;
  word-break: break-all;
}

/* ─── MAP EMBED ──────────────────────────────────────────────────────────── */
.map-embed {
  width: 100%; height: 200px;
  border-radius: var(--r);
  border: var(--border);
  background: var(--cream-dk);
  display: flex; align-items: center; justify-content: center;
  color: var(--stone); font-size: 12px;
  overflow: hidden;
}
.map-embed iframe { width: 100%; height: 100%; border: none; }

/* ─── SPINNER ────────────────────────────────────────────────────────────── */
.spinner { width: 28px; height: 28px; border: 2px solid var(--cream-dk); border-top-color: var(--timber); border-radius: 50%; animation: spin .8s linear infinite; margin: 40px auto; }
.spinner-sm { width: 16px; height: 16px; border-width: 1.5px; margin: 0; display: inline-block; }

/* ─── LOADING OVERLAY ────────────────────────────────────────────────────── */
.loading-cover { position: fixed; inset: 0; background: var(--paper); z-index: 999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.loading-cover-title { font-family: var(--serif); font-size: 18px; color: var(--bark); }
.loading-cover-sub { font-size: 12px; color: var(--stone); }

/* ─── SHEET ──────────────────────────────────────────────────────────────── */
.sheet-bg { position: fixed; inset: 0; background: rgba(30,28,25,.5); z-index: 200; display: flex; align-items: flex-start; justify-content: flex-end; animation: fadeIn .2s ease; }
.sheet { width: 500px; height: 100vh; background: #fff; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideR .25s ease; }
.sheet-head { padding: 18px 22px; border-bottom: var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; position: sticky; top: 0; background: #fff; z-index: 10; }
.sheet-title { font-family: var(--serif); font-size: 20px; font-weight: 500; color: var(--bark); line-height: 1.2; }
.sheet-close { width: 28px; height: 28px; border: none; background: var(--paper); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--stone); flex-shrink: 0; transition: all .12s; }
.sheet-close:hover { background: var(--cream-dk); color: var(--bark); }
.sheet-body { padding: 20px 22px; }

window.FB = {

  serverTimestamp: () => firebase.firestore.FieldValue.serverTimestamp(),
  collection: (d, path) => d.collection(path),
  doc: (d, col, id) => id !== undefined ? d.collection(col).doc(id) : d.doc(col),

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg, duration = 2600) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), duration);
}

function openSheet(html) {
  document.getElementById('sheetPanel').innerHTML = html;
  document.getElementById('sheetBg').style.display = 'flex';
}

function closeSheet(e) {
  if (e && e.target !== document.getElementById('sheetBg')) return;
  document.getElementById('sheetBg').style.display = 'none';
}

function closeSheetDirect() {
  document.getElementById('sheetBg').style.display = 'none';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheetDirect();
});

};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' });
}

function timeAgo(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

function tagHtml(type) {
  const map = { Timber:'tag-timber', Masonry:'tag-masonry', Metal:'tag-metal', Glass:'tag-glass', 'Fixtures & fittings':'tag-fixtures' };
  return `<span class="tag ${map[type]||'tag-other'}">${type||'Other'}</span>`;
}

function statusDot(s) {
  const map = { Available:'dot-av', Processing:'dot-pr', Allocated:'dot-al', Storage:'dot-so' };
  return `<span class="status-dot ${map[s]||'dot-so'}"></span>${s||'—'}`;
}

function mapEmbed(address) {
  if (!address) return '<div class="map-embed">No address set</div>';
  const q = encodeURIComponent(address);
  return `<div class="map-embed"><iframe loading="lazy" src="https://maps.google.com/maps?q=${q}&output=embed&z=15" allowfullscreen></iframe></div>`;
}

function initials(name) {
  if (!name) return '?';
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().substring(0,2);

// ─── GATE MODE ───────────────────────────────────────────────────────────────
let gateMode = 'signin';

function toggleGateMode() {
  gateMode = gateMode === 'signin' ? 'register' : 'signin';
  document.getElementById('gateTitle').textContent = gateMode === 'signin' ? 'Welcome back' : 'Request Access';
  document.getElementById('gateDesc').textContent = gateMode === 'signin' ? 'Sign in to access your project portal.' : 'Create your account. Dave will activate your project.';
  document.getElementById('gateBtn').textContent = gateMode === 'signin' ? 'Sign In' : 'Create Account';
  document.getElementById('gateToggle').textContent = gateMode === 'signin' ? 'Request Access' : 'Back to Sign In';
  document.getElementById('gateNameGroup').style.display = gateMode === 'register' ? 'block' : 'none';
}

async function handleGateAction() {
  const email = document.getElementById('gateEmail').value.trim();
  const password = document.getElementById('gatePassword').value;
  const btn = document.getElementById('gateBtn');
  const err = document.getElementById('gateError');

  if (!email || !password) { showGateError('Please enter your email and password.'); return; }

  btn.disabled = true;
  btn.textContent = 'Please wait...';
  err.style.display = 'none';

  try {
    if (gateMode === 'signin') {
      await window.FB.signInWithEmailAndPassword(window.FB.auth, email, password);
    } else {
      const name = document.getElementById('gateName').value.trim() || email.split('@')[0];
      const cred = await window.FB.createUserWithEmailAndPassword(window.FB.auth, email, password);
      // Create user record in Firestore
      await window.FB.addDoc(window.FB.collection(window.FB.db, 'users'), {
        uid: cred.user.uid,
        email, name, role: 'client',
        subscriptionTier: 'free',
        createdAt: window.FB.serverTimestamp()
      });
      toast('Account created. Welcome to TWR.');
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email.',
      'auth/wrong-password': 'Incorrect password.',
      'auth/invalid-credential': 'Incorrect email or password.',
      'auth/email-already-in-use': 'An account with this email already exists.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/invalid-email': 'Please enter a valid email address.',
    };
    showGateError(msgs[e.code] || 'Sign-in failed. Please try again.');
    btn.disabled = false;
    btn.textContent = gateMode === 'signin' ? 'Sign In' : 'Create Account';
  }
}

function showGateError(msg) {
  const el = document.getElementById('gateError');
  el.textContent = msg;
  el.style.display = 'block';
}

window.addEventListener('userSignedOut', () => {

// ─── SHELL SETUP ─────────────────────────────────────────────────────────────
function setupShell(user) {
  const isAdmin = user.role === 'admin';
  const name = user.name || user.email || 'User';

  document.getElementById('sbAv').textContent = initials(name);
  document.getElementById('sbName').textContent = name;
  document.getElementById('sbEnvLabel').textContent = isAdmin ? 'Admin Dashboard' : 'Client Portal';

  document.getElementById('sbRoleWrap').innerHTML =
    `<span class="sb-role ${isAdmin?'sb-role-admin':'sb-role-client'}">${isAdmin?'Admin':'Client'}</span>`;

  const greet = (() => {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  })();

  // Build nav
  const adminNav = [
    { id:'dashboard', icon:'grid', label:'Dashboard' },
    { id:'clients',   icon:'users', label:'Clients', section:'Clients' },
    { id:'briefs',    icon:'inbox', label:'Incoming Briefs', badge:'briefs' },
    { id:'projects',  icon:'folder', label:'All Projects', section:'Projects' },
    { id:'materials', icon:'layers', label:'Material Library' },
    { id:'signoffs',  icon:'check', label:'Signoffs', badge:'signoffs' },
    { id:'products',  icon:'box', label:'Product Catalogue', section:'Catalogue' },
    { id:'stories',   icon:'book', label:'Story Archive' },
    { id:'stats',     icon:'chart', label:'Stats & Reports', section:'Reporting' },
  ];

  const clientNav = [
    { id:'my-overview', icon:'home', label:'My Overview' },
    { id:'my-brief',    icon:'edit', label:'My Brief', section:'My Project' },
    { id:'my-materials',icon:'layers', label:'My Materials' },
    { id:'my-journal',  icon:'book-open', label:'Project Journal' },
    { id:'my-story',    icon:'star', label:'My Story' },
    { id:'twr-products',icon:'box', label:'TWR Products', section:'TWR' },
    { id:'refer',       icon:'share', label:'Refer a Friend' },
  ];

  const navItems = isAdmin ? adminNav : clientNav;
  let currentSection = '';

  document.getElementById('sbNav').innerHTML = navItems.map(item => {
    let sectionHtml = '';
    if (item.section && item.section !== currentSection) {
      currentSection = item.section;
      sectionHtml = `<div class="sb-lbl">${item.section}</div>`;
    }
    const badgeHtml = item.badge ? `<span class="sb-badge" id="badge-${item.badge}">0</span>` : '';
    return `${sectionHtml}<button class="sb-item" id="nav-${item.id}" onclick="navTo('${item.id}')">${svgIcon(item.icon)}${item.label}${badgeHtml}</button>`;
  }).join('');

  // Go to default page
  if (isAdmin) {
    document.getElementById('pageSub').textContent = greet + ', Dave';
    navTo('dashboard');
  } else {
    document.getElementById('pageSub').textContent = greet + (name ? ', ' + name.split(' ')[0] : '');
    navTo('my-overview');
  }
}

function navTo(page) {
  state.currentPage = page;
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const renderers = {
    dashboard: renderAdminDashboard,
    clients:   renderClients,
    briefs:    renderBriefs,
    projects:  renderAllProjects,

    products:  renderProducts,
    stories:   renderStories,
    stats:     renderStats,
    'my-overview': renderClientOverview,
    'my-brief':    renderMyBrief,
    'my-materials':renderMyMaterials,
    'my-journal':  renderMyJournal,
    'my-story':    renderMyStory,
    'twr-products':renderTWRProducts,
    'refer':       renderRefer,

  if (renderers[page]) renderers[page]();

function materialRow(m) {
  return `<tr onclick="openMaterialSheet('${m.id}')">

function filterMaterials() {
  const val = document.getElementById('matFilter').value;
  const filtered = val ? state.materials.filter(m=>m.projectName===val) : state.materials;
  const body = document.getElementById('matTable');
  if (body) {
    const rows = filtered.map(m=>materialRow(m)).join('');
    body.innerHTML = `<tr><th>Material</th><th>Type</th><th>Condition</th><th>Status</th><th>Signoff</th><th>Future Use</th><th></th></tr>${rows}`;
  }
}

async function submitBrief() {
  const user = window.currentUser;
  const address = document.getElementById('bf-address').value.trim();
  if (!address) { toast('Please enter your property address'); return; }

  const btn = document.getElementById('submitBriefBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';

  try {
    await window.FB.addDoc(window.FB.collection(window.FB.db, 'briefs'), {
      clientEmail: user.email,
      clientName: user.name || user.email,
      clientUid: user.uid,
      address,
      propertyType: document.getElementById('bf-proptype').value,
      materialsDescription: document.getElementById('bf-materials').value,
      goalsDescription: document.getElementById('bf-goals').value,
      photoLinks: document.getElementById('bf-photos').value,
      timeline: document.getElementById('bf-timeline').value,
      status: 'new',
      submittedAt: window.FB.serverTimestamp(),
    });
    toast('Brief submitted! Dave will be in touch soon. 🪵');
    setTimeout(() => navTo('my-overview'), 1500);
  } catch(e) {
    toast('Error submitting: ' + e.message);
    btn.disabled = false;
    btn.textContent = 'Submit Brief to Dave';

}

    toast('Progress updated');

  } catch(e) { toast('Error: ' + e.message); }
}

          <select class="form-select" id="je-milestone"><option value="">No</option><option value="true">Yes — mark as milestone</option></select>
        </div>
      </div>
      <button class="btn btn-timber btn-full" onclick="saveJournalEntry('${clientEmail}','${clientName}')">Save Entry</button>
    </div>`);
}

async function saveJournalEntry(clientEmail, clientName) {
  const title = document.getElementById('je-title').value.trim();
  const body  = document.getElementById('je-body').value.trim();
  if (!body) { toast('Please write an entry'); return; }
  try {
    await window.FB.addDoc(window.FB.collection(window.FB.db,'journal'), {
      clientEmail, clientName,
      title, body,
      photoLinks: document.getElementById('je-photo').value,
      milestone: document.getElementById('je-milestone').value === 'true',
      authorName: window.currentUser.name || window.currentUser.email,
      authorRole: window.currentUser.role,
      createdAt: window.FB.serverTimestamp(),
    });
    closeSheetDirect();
    toast('Journal entry saved ✓');
    if (state.currentPage === 'my-journal') renderMyJournal();
  } catch(e) { toast('Error: ' + e.message); }
}

function openAddProductSheet() { openEditProductSheet(null); }

function openEditProductSheet(productId) {
  openSheet(`
    <div class="sheet-head">
      <div><div class="sheet-title">${productId ? 'Edit Product' : 'Add Product'}</div></div>
      <button class="sheet-close" onclick="closeSheetDirect()">×</button>
    </div>
    <div class="sheet-body">
      <div class="form-group"><label class="form-label">Product Name</label><input class="form-input" id="pd-name" placeholder="e.g. Dining Table — 6 Seater"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="pd-desc" placeholder="What this product is, how it's made, what materials it requires..."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Price Range</label><input class="form-input" id="pd-price" placeholder="e.g. $4,500 – $8,000"></div>
        <div class="form-group"><label class="form-label">Lead Time</label><input class="form-input" id="pd-lead" placeholder="e.g. 6–10 weeks"></div>
      </div>
      <div class="form-group"><label class="form-label">Visibility</label>
        <select class="form-select" id="pd-visible"><option value="true">Visible to paid subscribers</option><option value="false">Hidden</option></select>
      </div>
      <button class="btn btn-timber btn-full" onclick="saveProduct('${productId||''}')">Save Product</button>
    </div>`);
}

async function saveProduct(productId) {
  const name = document.getElementById('pd-name').value.trim();
  if (!name) { toast('Product name required'); return; }
  const data = {
    name, description: document.getElementById('pd-desc').value,
    priceRange: document.getElementById('pd-price').value,
    leadTime: document.getElementById('pd-lead').value,
    visible: document.getElementById('pd-visible').value === 'true',
    updatedAt: window.FB.serverTimestamp(),
  };
  try {
    if (productId) await window.FB.updateDoc(window.FB.doc(window.FB.db,'products',productId), data);
    else { data.createdAt = window.FB.serverTimestamp(); await window.FB.addDoc(window.FB.collection(window.FB.db,'products'), data); }
    closeSheetDirect();
    toast('Product saved ✓');
    renderProducts();
  } catch(e) { toast('Error: ' + e.message); }
}

function openAllProjectsSheet() {}
async function renderAllProjects() {
  document.getElementById('topbarRight').innerHTML = '';
  document.getElementById('mainContent').innerHTML = '<div class="spinner"></div>';
  try {
    const snap = await window.FB.getDocs(window.FB.collection(window.FB.db,'projects'));
    state.projects = snap.docs.map(d=>({id:d.id,...d.data()}));
    const clientsSnap = await window.FB.getDocs(window.FB.collection(window.FB.db,'clients'));
    state.clients = clientsSnap.docs.map(d=>({id:d.id,...d.data()}));
    document.getElementById('mainContent').innerHTML = `<div class="fu">
      <div class="panel">
        <div class="panel-head"><div class="panel-title">All Projects (${state.projects.length})</div></div>
        ${state.projects.length ? `<table class="tbl">
          <tr><th>Project</th><th>Client</th><th>Type</th><th>Status</th><th>Progress</th></tr>
          ${state.projects.map(p=>{
            const client = state.clients.find(c=>c.id===p.clientId);
            return `<tr onclick="openProjectSheet('${p.id}')">
              <td><div class="mat-name">${p.name||'Unnamed'}</div><div class="mat-origin">${p.address||''}</div></td>
              <td style="font-size:12px">${client?.name||p.clientName||'—'}</td>
              <td style="font-size:12px">${p.type||'—'}</td>
              <td><span class="badge ${p.status==='Active'?'badge-green':p.status==='Complete'?'badge-moss':'badge-amber'}">${p.status||'Active'}</span></td>
              <td><div class="prog-bar" style="width:80px;margin:0"><div class="prog-fill" style="width:${p.progress||5}%"></div></div></td>
            </tr>`;
          }).join('')}
        </table>` : '<div class="panel-body"><div style="font-size:12px;color:var(--stone)">No projects yet.</div></div>'}
      </div></div>`;
  } catch(e) { toast('Error: ' + e.message); }
}
